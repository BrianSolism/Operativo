server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy MFE remotes ────────────────────────────────────
    location ^~ /mfe/almacenfront/ {
        proxy_pass         http://almacenfront/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    location ^~ /mfe/clientesfront/ {
        proxy_pass         http://clientesfront/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    # ── AuthBack (puerto 3002) ───────────────────────────────
    location /api/auth {
        proxy_pass         http://authback:3002/api/auth;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Clientesback (puerto 3000) ───────────────────────────
    location /api/clientes       { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/representantes { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/contratos      { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/empresas       { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/usuarios       { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/cp             { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/quien-es-quien { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/cat            { proxy_pass http://clientesback:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── Almacenback (puerto 3001) — fallback para /api ───────
    location /api {
        proxy_pass         http://almacenback:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache assets estáticos ───────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
